services:
  db:
    image: postgres:16
    container_name: horse_handicapping_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - horse_handicapping_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  horse_handicapping_data: